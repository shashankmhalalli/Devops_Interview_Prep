---
# playbook.yml
# ─────────────────────────────────────────────────────────────────────────────
# Configures EC2 instances provisioned by Terraform:
#   1. System update
#   2. Install Nginx
#   3. Configure Nginx (custom server block)
#   4. Deploy website files
#   5. Start + enable Nginx
# ─────────────────────────────────────────────────────────────────────────────

- name: Configure web servers
  hosts: web_servers
  become: true          # sudo
  gather_facts: true

  vars:
    nginx_web_root: /var/www/html
    app_name: devops-project5

  # ─── Pre-checks ─────────────────────────────────────────────────────────────
  pre_tasks:
    - name: Wait for SSH to come up
      ansible.builtin.wait_for_connection:
        delay: 10
        timeout: 120

    - name: Gather facts after SSH is ready
      ansible.builtin.setup:

  # ─── Tasks ──────────────────────────────────────────────────────────────────
  tasks:

    # 1. System update
    - name: Update apt cache and upgrade packages
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist
        cache_valid_time: 3600

    # 2. Install Nginx
    - name: Install Nginx
      ansible.builtin.apt:
        name: nginx
        state: present

    # 3. Remove default Nginx site
    - name: Remove default Nginx site config
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: Reload Nginx

    # 4. Deploy custom Nginx server block
    - name: Write custom Nginx site config
      ansible.builtin.template:
        src: templates/nginx_site.conf.j2
        dest: /etc/nginx/sites-available/{{ app_name }}
        owner: root
        group: root
        mode: "0644"
      notify: Reload Nginx

    - name: Enable custom Nginx site
      ansible.builtin.file:
        src: /etc/nginx/sites-available/{{ app_name }}
        dest: /etc/nginx/sites-enabled/{{ app_name }}
        state: link
      notify: Reload Nginx

    # 5. Ensure web root exists
    - name: Create web root directory
      ansible.builtin.file:
        path: "{{ nginx_web_root }}"
        state: directory
        owner: www-data
        group: www-data
        mode: "0755"

    # 6. Deploy website files
    - name: Copy index.html to web root
      ansible.builtin.copy:
        src: files/index.html
        dest: "{{ nginx_web_root }}/index.html"
        owner: www-data
        group: www-data
        mode: "0644"
      notify: Reload Nginx

    # 7. Ensure Nginx is running and enabled at boot
    - name: Ensure Nginx is started and enabled
      ansible.builtin.systemd:
        name: nginx
        state: started
        enabled: true

    # 8. Open firewall (UFW) if active
    - name: Allow Nginx HTTP through UFW
      community.general.ufw:
        rule: allow
        name: "Nginx HTTP"
      when: ansible_facts['os_family'] == 'Debian'
      ignore_errors: true   # UFW may not be installed; non-critical

    # 9. Smoke-test: hit localhost and check HTTP 200
    - name: Verify Nginx returns HTTP 200 on localhost
      ansible.builtin.uri:
        url: http://localhost
        status_code: 200
      register: nginx_check
      retries: 3
      delay: 5
      until: nginx_check.status == 200

  # ─── Handlers ───────────────────────────────────────────────────────────────
  handlers:
    - name: Reload Nginx
      ansible.builtin.systemd:
        name: nginx
        state: reloaded

  # ─── Post-tasks ─────────────────────────────────────────────────────────────
  post_tasks:
    - name: Print instance info
      ansible.builtin.debug:
        msg: |
          ✅  {{ inventory_hostname }} is configured.
          Public IP  : {{ ansible_host }}
          Nginx      : running
          Web root   : {{ nginx_web_root }}
          URL        : http://{{ ansible_host }}/
